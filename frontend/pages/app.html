<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enigma</title>
<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/chat.css">
<link rel="stylesheet" href="../css/call.css">
</head>
<body>

<div class="app">

  <!-- ── Left icon nav ── -->
  <nav class="app-nav">
    <div class="app-nav-logo">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="20" height="20" color="#07090d">
        <path stroke-linecap="round" stroke-linejoin="round" d="M8.625 12a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H8.25m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H12m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0h-.375M21 12c0 4.556-4.03 8.25-9 8.25a9.764 9.764 0 01-2.555-.337A5.972 5.972 0 015.41 20.97a5.969 5.969 0 01-.474-.065 4.48 4.48 0 00.978-2.025c.09-.457-.133-.901-.467-1.226C3.93 16.178 3 14.189 3 12c0-4.556 4.03-8.25 9-8.25s9 3.694 9 8.25z"/>
      </svg>
    </div>

    <button class="nav-icon-btn active" title="Чаты" id="btn-nav-chats">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="20" height="20">
        <path stroke-linecap="round" stroke-linejoin="round" d="M8.625 12a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H8.25m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H12m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0h-.375M21 12c0 4.556-4.03 8.25-9 8.25a9.764 9.764 0 01-2.555-.337A5.972 5.972 0 015.41 20.97a5.969 5.969 0 01-.474-.065 4.48 4.48 0 00.978-2.025c.09-.457-.133-.901-.467-1.226C3.93 16.178 3 14.189 3 12c0-4.556 4.03-8.25 9-8.25s9 3.694 9 8.25z"/>
      </svg>
    </button>

    <button class="nav-icon-btn" title="Контакты" id="btn-nav-contacts">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="20" height="20">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 018.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0111.964-3.07M12 6.375a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zm8.25 2.25a2.625 2.625 0 11-5.25 0 2.625 2.625 0 015.25 0z"/>
      </svg>
    </button>

    <div class="nav-spacer"></div>

    <button class="nav-icon-btn" title="Настройки" id="btn-nav-settings">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="20" height="20">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.324.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.431l-1.003.827c-.293.24-.438.613-.431.992a6.759 6.759 0 010 .255c-.007.378.138.75.43.99l1.005.828c.424.35.534.954.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.57 6.57 0 01-.22.128c-.331.183-.581.495-.644.869l-.213 1.28c-.09.543-.56.941-1.11.941h-2.594c-.55 0-1.02-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 01-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.431l1.004-.827c.292-.24.437-.613.43-.992a6.932 6.932 0 010-.255c.007-.378-.138-.75-.43-.99l-1.004-.828a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.087.22-.128.332-.183.582-.495.644-.869l.214-1.281z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
      </svg>
    </button>

    <button class="nav-avatar-btn" id="nav-user-avatar" title="Профиль"></button>
  </nav>

  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">
        Сообщения
        <button class="btn-icon" id="btn-new-chat" title="Новый чат" style="width:28px;height:28px">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="16" height="16">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/>
          </svg>
        </button>
      </div>
      <div class="search-wrap">
        <svg class="search-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 15.803a7.5 7.5 0 0010.607 0z"/>
        </svg>
        <input class="search-input" id="chat-search" placeholder="Поиск чатов..." type="search" autocomplete="off">
      </div>
    </div>
    <div class="chat-list" id="chat-list">
      <!-- Skeleton loaders -->
      <div style="padding:8px;display:flex;flex-direction:column;gap:6px">
        <div style="height:60px;border-radius:10px;background:var(--bg3);animation:pulse 1.5s infinite"></div>
        <div style="height:60px;border-radius:10px;background:var(--bg3);animation:pulse 1.5s infinite 0.2s"></div>
        <div style="height:60px;border-radius:10px;background:var(--bg3);animation:pulse 1.5s infinite 0.4s"></div>
      </div>
    </div>
  </aside>

  <!-- ── Main ── -->
  <main class="chat-main">

    <!-- Empty state -->
    <div class="chat-empty" id="chat-empty">
      <div class="chat-empty-icon">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" width="36" height="36">
          <path stroke-linecap="round" stroke-linejoin="round" d="M8.625 12a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H8.25m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H12m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0h-.375M21 12c0 4.556-4.03 8.25-9 8.25a9.764 9.764 0 01-2.555-.337A5.972 5.972 0 015.41 20.97a5.969 5.969 0 01-.474-.065 4.48 4.48 0 00.978-2.025c.09-.457-.133-.901-.467-1.226C3.93 16.178 3 14.189 3 12c0-4.556 4.03-8.25 9-8.25s9 3.694 9 8.25z"/>
        </svg>
      </div>
      <div class="chat-empty-title">Выбери чат</div>
      <div class="chat-empty-desc">или начни новый разговор</div>
      <button class="btn btn-ghost btn-sm" id="btn-new-chat-2" style="margin-top:8px">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="16" height="16">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/>
        </svg>
        Новый чат
      </button>
    </div>

    <!-- Chat inner (hidden until chat opened) -->
    <div id="chat-main-inner" class="hidden" style="display:flex;flex-direction:column;height:100%;overflow:hidden">
      <!-- Header -->
      <div class="chat-header" id="chat-header"></div>

      <!-- Messages -->
      <div class="messages-area" id="messages-area"></div>

      <!-- Typing indicator -->
      <div class="typing-indicator" id="typing-indicator" style="display:none;padding:4px 20px 0">
        <div class="typing-bubble">
          <span class="typing-dot"></span>
          <span class="typing-dot"></span>
          <span class="typing-dot"></span>
        </div>
      </div>

      <!-- Reply preview -->
      <div class="reply-preview" id="reply-preview" style="margin:0 20px">
        <span class="reply-preview-text"></span>
        <button class="reply-preview-close" id="reply-close">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="14" height="14">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>

      <!-- Input -->
      <div class="chat-input-area">
        <div class="chat-input-wrap">
          <div class="chat-input-attach-btns">
            <button class="attach-btn" id="btn-attach-image" title="Изображение">
              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="18" height="18">
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909m-18 3.75h16.5a1.5 1.5 0 001.5-1.5V6a1.5 1.5 0 00-1.5-1.5H3.75A1.5 1.5 0 002.25 6v12a1.5 1.5 0 001.5 1.5zm10.5-11.25h.008v.008h-.008V8.25zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z"/>
              </svg>
            </button>
            <button class="attach-btn" id="btn-attach-file" title="Файл">
              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="18" height="18">
                <path stroke-linecap="round" stroke-linejoin="round" d="M18.375 12.739l-7.693 7.693a4.5 4.5 0 01-6.364-6.364l10.94-10.94A3 3 0 1119.5 7.372L8.552 18.32m.009-.01l-.01.01m5.699-9.941l-7.81 7.81a1.5 1.5 0 002.112 2.13"/>
              </svg>
            </button>
          </div>

          <textarea class="chat-input-box" id="chat-input-box"
            placeholder="Напиши сообщение..." rows="1"></textarea>

          <button class="send-btn" id="send-btn" title="Отправить">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="18" height="18">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
            </svg>
          </button>
        </div>

        <!-- Hidden file inputs -->
        <input type="file" id="image-input" accept="image/*,image/gif" style="display:none" multiple>
        <input type="file" id="file-input" accept="*/*" style="display:none" multiple>
      </div>
    </div>
  </main>
</div>

<!-- ── Incoming call popup ── -->
<div class="incoming-call" id="incoming-call">
  <div class="incoming-call-header">
    <div class="incoming-call-pulse"></div>
    <div>
      <div class="incoming-call-label">Входящий звонок</div>
      <div class="incoming-call-name"></div>
      <div class="incoming-call-type"></div>
    </div>
  </div>
  <div class="incoming-call-btns">
    <button class="btn btn-danger" id="btn-decline-call">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="16" height="16">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 3.75L18 6m0 0l2.25 2.25M18 6l2.25-2.25M18 6l-2.25 2.25M3 3l1.664 1.664M21 21l-1.5-1.5m-5.485-1.242L12 17.25 4.5 21V8.742m.164-4.078a2.15 2.15 0 011.743-1.342 48.507 48.507 0 0111.186 0c1.1.128 1.907 1.077 1.907 2.185V19.5"/>
      </svg>
      Отклонить
    </button>
    <button class="btn btn-primary" id="btn-accept-call">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="16" height="16">
        <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 002.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-.97 1.293c-.282.376-.769.542-1.21.38a12.035 12.035 0 01-7.143-7.143c-.162-.441.004-.928.38-1.21l1.293-.97c.363-.271.527-.734.417-1.173L6.963 3.102a1.125 1.125 0 00-1.091-.852H4.5A2.25 2.25 0 002.25 4.5v2.25z"/>
      </svg>
      Принять
    </button>
  </div>
</div>

<!-- ── Call overlay ── -->
<div class="call-overlay" id="call-overlay">
  <div class="call-bg-blur"></div>

  <div class="call-header">
    <div class="call-header-info">
      <div class="call-header-name"></div>
      <div class="call-header-type"></div>
    </div>
    <div class="call-timer" id="call-timer">00:00</div>
  </div>

  <!-- Video grid -->
  <div class="call-video-grid layout-1v1" id="call-video-grid">
    <div class="call-tile">
      <video id="remote-video" autoplay playsinline class="call-tile-video"></video>
      <div class="call-tile-no-video" id="remote-no-video">
        <div style="width:80px;height:80px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" width="40" height="40" color="var(--text3)">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0"/>
          </svg>
        </div>
      </div>
      <div class="call-tile-name" id="call-remote-name"></div>
    </div>
  </div>

  <!-- Audio call avatar -->
  <div class="call-audio-avatar" id="call-audio-avatar" style="display:none;flex-direction:column;align-items:center;gap:16px;flex:1;justify-content:center">
    <div class="call-audio-ring">
      <div class="avatar-placeholder avatar-xxl" id="call-audio-av"></div>
    </div>
    <div class="call-audio-name" id="call-audio-name"></div>
    <div class="call-status" id="call-status">📞 Вызов...</div>
  </div>

  <!-- Self view (PiP) -->
  <div class="call-self-view" id="call-self-view">
    <video id="self-video" autoplay muted playsinline></video>
  </div>

  <!-- Controls -->
  <div class="call-controls">
    <button class="call-btn call-btn-default" id="btn-mute" title="Микрофон">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="22" height="22">
        <path stroke-linecap="round" stroke-linejoin="round" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 016 0v6a3 3 0 01-3 3z"/>
      </svg>
    </button>
    <button class="call-btn call-btn-default" id="btn-video" title="Камера">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="22" height="22">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 10l4.553-2.069A1 1 0 0121 8.82v6.362a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/>
      </svg>
    </button>
    <button class="call-btn call-btn-default" id="btn-screen" title="Экран">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="22" height="22">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 17.25v1.007a3 3 0 01-.879 2.122L7.5 21h9l-.621-.621A3 3 0 0115 18.257V17.25m6-12V15a2.25 2.25 0 01-2.25 2.25H5.25A2.25 2.25 0 013 15V5.25A2.25 2.25 0 015.25 3h13.5A2.25 2.25 0 0121 5.25z"/>
      </svg>
    </button>
    <button class="call-btn call-btn-end" id="btn-end-call" title="Завершить">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="22" height="22">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 3.75L18 6m0 0l2.25 2.25M18 6l2.25-2.25M18 6l-2.25 2.25M3 3l1.664 1.664M21 21l-1.5-1.5m-5.485-1.242L12 17.25 4.5 21V8.742m.164-4.078a2.15 2.15 0 011.743-1.342 48.507 48.507 0 0111.186 0c1.1.128 1.907 1.077 1.907 2.185V19.5"/>
      </svg>
    </button>
  </div>
</div>

<div id="toast-container"></div>

<script src="../js/api.js"></script>
<script src="../js/ui.js"></script>
<script src="../js/webrtc.js"></script>
<script src="../js/chat.js"></script>
<script>
  document.getElementById('btn-new-chat-2')?.addEventListener('click', () => {
    document.getElementById('btn-new-chat')?.click();
  });
</script>
</body>
</html>
