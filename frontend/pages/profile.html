<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enigma — Профиль</title>
<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/profile.css">
</head>
<body style="overflow-y:auto;height:auto">

<div class="profile-edit-page">

  <div class="profile-edit-header">
    <button class="profile-edit-back" id="btn-back" title="Назад">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="18" height="18">
        <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18"/>
      </svg>
    </button>
    <h2 style="font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:700">Мой профиль</h2>
  </div>

  <!-- Avatar editor -->
  <div class="profile-avatar-editor">
    <div id="avatar-upload-area" class="avatar-upload-area" title="Загрузить аватар">
      <svg class="upload-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" width="24" height="24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/>
      </svg>
      <span class="avatar-upload-hint" style="font-size:.65rem;color:var(--text3)">Загрузить</span>
    </div>
    <div id="profile-avatar" style="flex-shrink:0"></div>
    <div style="flex:1">
      <div style="font-size:.75rem;color:var(--text3);margin-bottom:6px">Выбери готовый аватар:</div>
      <div class="avatar-presets" id="avatar-presets">
        <!-- Generated by JS or static emoji-based placeholders -->
      </div>
    </div>
    <input type="file" id="avatar-file-input" accept="image/*" style="display:none">
  </div>

  <!-- Profile form -->
  <form class="profile-edit-form" id="profile-edit-form" novalidate>

    <div class="input-group">
      <label class="input-label">Логин</label>
      <input class="input" type="text" id="input-login" readonly
        style="opacity:.5;cursor:not-allowed" autocomplete="username">
      <small>Логин нельзя изменить</small>
    </div>

    <div class="input-group">
      <label class="input-label">Отображаемое имя</label>
      <input class="input" type="text" id="input-nickname" placeholder="Как тебя зовут?" maxlength="32">
    </div>

    <div class="input-group">
      <label class="input-label">Email</label>
      <input class="input" type="email" id="input-email" readonly
        style="opacity:.5;cursor:not-allowed">
    </div>

    <div class="input-group">
      <label class="input-label">Статус</label>
      <input class="input" type="text" id="input-status" placeholder="Онлайн, занят, не беспокоить..." maxlength="60">
    </div>

    <div class="profile-edit-section-title">Акцентный цвет</div>
    <div class="color-theme-picker" id="color-picker">
      <div class="color-swatch selected" data-color="#00d28c" style="background:#00d28c" title="Зелёный (по умолчанию)"></div>
      <div class="color-swatch" data-color="#1e90ff" style="background:#1e90ff" title="Синий"></div>
      <div class="color-swatch" data-color="#a855f7" style="background:#a855f7" title="Фиолетовый"></div>
      <div class="color-swatch" data-color="#f97316" style="background:#f97316" title="Оранжевый"></div>
      <div class="color-swatch" data-color="#ec4899" style="background:#ec4899" title="Розовый"></div>
      <div class="color-swatch" data-color="#eab308" style="background:#eab308" title="Жёлтый"></div>
      <div class="color-swatch" data-color="#ef4444" style="background:#ef4444" title="Красный"></div>
      <div class="color-swatch" data-color="#06b6d4" style="background:#06b6d4" title="Голубой"></div>
    </div>

    <button type="submit" class="btn btn-primary" id="btn-save-profile" style="margin-top:8px">
      Сохранить
    </button>
  </form>

  <!-- Password change -->
  <div style="margin-top:32px">
    <div class="profile-edit-section-title" style="margin-bottom:16px;padding-top:0">Сменить пароль</div>
    <div id="pw-change-error" class="form-error"></div>
    <form class="profile-edit-form" id="password-change-form" novalidate style="gap:12px">
      <div class="input-group">
        <label class="input-label">Текущий пароль</label>
        <input class="input" type="password" id="input-old-password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <div class="input-group">
        <label class="input-label">Новый пароль</label>
        <input class="input" type="password" id="input-new-password" placeholder="Минимум 6 символов" autocomplete="new-password">
      </div>
      <div class="input-group">
        <label class="input-label">Повтори новый пароль</label>
        <input class="input" type="password" id="input-new-password-confirm" placeholder="••••••••" autocomplete="new-password">
      </div>
      <button type="submit" class="btn btn-ghost" id="btn-change-password">Сменить пароль</button>
    </form>
  </div>

  <!-- Danger zone -->
  <div style="margin-top:32px;padding-bottom:48px">
    <div class="profile-edit-section-title" style="color:var(--danger);padding-top:0;margin-bottom:16px">Опасная зона</div>
    <button class="btn btn-danger" id="btn-logout">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="16" height="16">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75"/>
      </svg>
      Выйти из аккаунта
    </button>
  </div>
</div>

<div id="toast-container"></div>

<script src="../js/api.js"></script>
<script src="../js/ui.js"></script>
<script src="../js/profile.js"></script>
<script>
  // Generate color avatar presets
  const names = ['😎','🦊','🐺','🌊','🔥','⚡','🌙','🎯'];
  const colors = ['#00d28c','#1e90ff','#a855f7','#f97316','#ec4899','#eab308','#ef4444','#06b6d4'];
  const presetsEl = document.getElementById('avatar-presets');
  if (presetsEl) {
    names.forEach((emoji, i) => {
      const el = document.createElement('div');
      el.className = 'avatar-preset';
      el.style.cssText = `background:${colors[i]}22;border:2px solid transparent;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;border-radius:50%;width:44px;height:44px;flex-shrink:0`;
      el.textContent = emoji;
      el.title = `Аватар ${i+1}`;
      el.addEventListener('click', () => {
        // create canvas avatar
        const canvas = document.createElement('canvas');
        canvas.width = canvas.height = 120;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = colors[i];
        ctx.beginPath(); ctx.arc(60,60,60,0,Math.PI*2); ctx.fill();
        ctx.font = '56px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(emoji, 60, 64);
        canvas.toBlob(blob => {
          const file = new File([blob], 'avatar.png', { type:'image/png' });
          window.avatarFile = file;
          const url = canvas.toDataURL();
          document.getElementById('avatar-upload-area').innerHTML =
            `<img src="${url}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:50%">`;
          document.getElementById('profile-avatar').innerHTML =
            `<img src="${url}" class="avatar avatar-xxl" alt="">`;
        });
      });
      presetsEl.appendChild(el);
    });
  }
</script>
</body>
</html>
